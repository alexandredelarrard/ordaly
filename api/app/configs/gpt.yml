gpt:
  # Text extraction backend: "google" (GOOGLE_API_KEY) or "openai" (OPENAI_API_KEY)
  default_api: google
  seed: 42
  temperature: 0.1
  max_token: 8192

  model_fast: 
    google: gemini-2.5-flash-lite
    openai: gpt-5-nano
  model_deep: 
    google: gemini-2.5-flash-lite
    openai: gpt-5-nano
  
  openai_reasoning_effort: medium
